name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          # 优先选择最新的 Xcode 16.x
          for ver in 16.3 16.2 16.1 16.0; do
            XCODE_PATH="/Applications/Xcode_${ver}.app"
            if [ -d "$XCODE_PATH" ]; then
              sudo xcode-select -s "$XCODE_PATH"
              break
            fi
          done
          xcodebuild -version

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace AngelLive.xcworkspace \
            -scheme AngelLive \
            -destination "generic/platform=iOS"

      - name: Build Archive (Unsigned)
        run: |
          xcodebuild archive \
            -workspace AngelLive.xcworkspace \
            -scheme AngelLive \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$RUNNER_TEMP/AngelLive.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/AngelLive.xcarchive/Products" \
            -name "*.app" -maxdepth 5 | head -1)
          echo "Found .app at: $APP_PATH"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -r "AngelLive-unsigned.ipa" Payload
          echo "IPA size: $(du -sh AngelLive-unsigned.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AngelLive-unsigned-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/AngelLive-unsigned.ipa
          retention-days: 7
