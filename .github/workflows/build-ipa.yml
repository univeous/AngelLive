name: Build Unsigned IPA

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    env:
      # TracyPlayer/FFmpegKit 和 TracyPlayer/KSPlayer 仓库不存在，
      # USE_VLC=1 时 Package.swift 会跳过它们，改用 VLCKitSPM
      USE_VLC: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -workspace AngelLive.xcworkspace \
            -scheme AngelLive

      - name: Build (Unsigned)
        run: |
          xcodebuild build \
            -workspace AngelLive.xcworkspace \
            -scheme AngelLive \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package IPA
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData" -name "AngelLive.app" -not -path "*/intermediates/*" | head -1)
          echo "Found .app at: $APP_PATH"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -r "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"
          cd "$RUNNER_TEMP/ipa"
          zip -q -r "AngelLive-unsigned.ipa" Payload
          echo "IPA size: $(du -sh AngelLive-unsigned.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: AngelLive-unsigned-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/AngelLive-unsigned.ipa
          retention-days: 7
